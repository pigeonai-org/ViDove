name: ViDove ci/cd pipeline

on:
    push:
        branches: [ release, main ]
    pull_request:
        branches: [ release, main ]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        steps:
            - uses: actions/checkout@v4

            - name: Set up python 3.10
              uses: actions/setup-python@v3
              with:
                  python-version: "3.10"
                  architecture: "x64"
            
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                python -m pip install "openai>=1.35.0,<2.0.0" "pydantic>=2.0.0" "tqdm>=4.65.0"

            - name: Test with unittest
              run: |
                python tests/test_remove_punc.py
                python tests/test_chunk_alignment.py
                python tests/test_translation.py
                python tests/test_output_render.py

    build:

        runs-on: ubuntu-latest
        if: github.event_name == 'push'

        needs: test

        steps:

            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to DockerHub
              uses: docker/login-action@v1
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Extract metadata (tags, labels) from Docker
              id: meta
              uses: docker/metadata-action@v3
              with:
                  images: 'johojakusha/vidove'

            - name: Build and push Docker image
              uses: docker/build-push-action@v2
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
